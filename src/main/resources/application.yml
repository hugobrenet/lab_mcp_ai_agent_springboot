github:
  owner: ${GITHUB_OWNER:test-owner}
  repo: ${GITHUB_REPO:test-repo}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:test-key}
  model: claude-sonnet-4-20250514
  max-tokens: 800
  timeout-seconds: 60

mcp:
  base-url: http://localhost:3333
  path: /mcp

management:
  endpoints:
    web:
      exposure:
        include: health,info